    - xform/Ⓢ/ao/
    - xform/Ⓓ/ui/
    - xform/ⓓ/in/
    - xform/Ⓕ/ua/
    - xform/ⓕ/ian/
    - xform/Ⓖ/uan/
    - xform/Ⓗ/ang/
    - xform/Ⓙ/iong/
    - xform/ⓙ/an/
    - xform/Ⓚ/ia/
    - xform/ⓚ/ai/
    - xform/Ⓛ/ong/
    - xform/Ⓩ/uang/
    - xform/Ⓧ/u/
    - xform/ⓧ/ü/
    - xform/Ⓒ/iao/
    - xform/Ⓥ/uai/
    - xform/ⓥ/ing/
    - xform/Ⓑ/ue/
    - xform/ⓑ/ve/
    - xform/Ⓝ/eng/
    - xform/Ⓜ/iang/
    - xform/ⓜ/en/
