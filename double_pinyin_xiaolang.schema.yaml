    - xform/([jqxy])j/$1Ⓙ/
    - xform/(\w)j/$1ⓙ/
    - xform/([bpmfdtnljqx])k/$1Ⓚ/
    - xform/(\w)k/$1ⓚ/
    - xform/(\w)l/$1Ⓛ/
    - xform/([gkheiv])z/$1Ⓩ/
    - xform/([jqxy])x/$1Ⓧ/
    - xform/([nl])x/$1ⓧ/
    - xform/([bpmfdtnljqx])c/$1Ⓒ/
    - xform/([gkheiv])v/$1Ⓥ/
    - xform/(\w)v/$1ⓥ/
    - xform/([jqxy])b/$1Ⓑ/
    - xform/([nl])b/$1ⓑ/
    - xform/(\w)n/$1Ⓝ/
    - xform/([bpmfdtnljqxy])m/$1Ⓜ/
    - xform/(\w)m/$1ⓜ/
    - "xform/(^|[ '])e/$1zh/"
    - "xform/(^|[ '])i/$1ch/"
    - "xform/(^|[ '])v/$1sh/"
    - xform/Ⓦ/ei/
    - xform/Ⓡ/ou/
    - xform/Ⓣ/iu/
    - xform/Ⓨ/ün/
