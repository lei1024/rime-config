melt_eng:
  dictionary: melt_eng
  enable_sentence: false
  enable_user_dict: false
  initial_quality: 0.8
  comment_format:
    - xform/.*//

cn_en:
  dictionary: ""
  user_dict: dicts/rime_ice.cn_en
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 0.5
  comment_format:
    - xform/^.+$//

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
  algebra:
    - xlit/āáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜü/aaaaooooeeeeiiiiuuuuvvvvv/
    - xform/^ng$/eng/
    - xform/ńg|ňg|ǹg/eng/
    - xform/ń|ň|ǹ/en/
    - erase/^xx$/
    - derive/^([jqxy])u$/$1v/
    - xform/^a$/AA/
    - xform/^ai$/AI/
    - xform/^an$/AN/
    - xform/^ang$/AH/
    - xform/^ao$/AO/
    - xform/^e$/UU/
    - xform/^ei$/UI/
    - xform/^en$/UN/
    - xform/^eng$/UN/
    - xform/^er$/UR/
    - xform/^o$/OO/
    - xform/^ou$/OU/
    - xform/^zh/E/
    - xform/^ch/I/
    - xform/^sh/V/
    - xform/iu$/T/
    - xform/(.)ei$/$1W/
    - xform/(.)ou$/$1R/
    - xform/[uv]n$/Y/
    - xform/uo$/O/
    - xform/ie$/P/
    - xform/uang$/Z/
    - xform/(.)iao$/$1C/
    - xform/ing$|uai$/V/
    - xform/(.)iang$/$1M/
    - xform/(.)ao$/$1S/
    - xform/in$|ui$/D/
    - xform/ian$|ua$/F/
    - xform/uan$/G/
    - xform/(.)ang$/$1H/
    - xform/iong$/$1J/
    - xform/(.)an$/$1J/
    - xform/ia$|ai$/K/
    - xform/ong$/L/
    - xform/[uv]e$/B/
    - xform/(.)eng$/$1N/
    - xform/(.)en$/$1M/
    - xform/v$/X/
    - xlit/ABCDEFGHIJKLMNOPQRSTUVWXYZ/abcdefghijklmnopqrstuvwxyz/

wubi98_mint:
  tag: wubi98_mint
  dictionary: wubi98_mint
  enable_user_dict: false
  enable_completion: true
  prefix: "Uw"
  tips: 〔五笔〕

radical_reverse_lookup:
  tag: radical_lookup
  dictionary: radical_pinyin
  enable_user_dict: false
  prefix: "Uu"
  tips: "〔拆字〕"

reverse_lookup:
  tags: [wubi98_mint,stroke,radical_lookup]
  overwrite_comment: true
  dictionary: rime_mint

stroke:
  tag: stroke
  dictionary: stroke
  enable_user_dict: false
  prefix: "Ui"
  tips: 〔笔画〕
  preedit_format:
    - xlit/hspnz/一丨丿丶乙/

punctuator:
  import_preset: symbols
  half_shape:
    "#": "#"
    "*": "*"
    ".": { commit: 。 }
    "`": "`"
    "~": "~"
    "@": "@"
    "=": "="
    "/": ["/", "÷"]
    "\\": "、"
    "_": "──"
    "'": { pair: ["「", "」"] }
    "[": ["【", "["]
    "]": ["】", "]"]
    "$": ["¥", "$", "€", "£", "¢", "¤"]
    "<": ["《", "〈", "«", "<"]
    ">": ["》", "〉", "»", ">"]

recognizer:
  import_preset: default
  patterns:
    url: "^[a-z]+[.].+$"
    punct: "^/([0-9]0?|[a-zA-Z]+)$"
    wubi98_mint: "Uw[a-z]*'?$"
    stroke: "Ui[a-z]*'?$"
    radical_lookup: "Uu[a-z]*'?$"
    rmb: "^R[0-9]+[.]?[0-9]*"
    expression: "^=.*$"
    gregorian_to_lunar: "^N[0-9]{1,8}"
    uppercase: ""

key_binder:
  import_preset: default
  shijian_keys: ["o"]
  bindings:
    - {accept: "Control+Shift+E", toggle: emoji_suggestion, when: always}
    - {accept: "Control+Shift+C", toggle: chaifen, when: always}
    - {accept: "Control+Shift+1", toggle: transcription, when: has_menu}
    - {accept: "Control+Shift+exclam", toggle: transcription, when: has_menu}

menu:
  page_size: 6
